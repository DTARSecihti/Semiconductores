<!doctype html>
<html lang="en">

    <body>
        <div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>

        <script>
        var highlightLayer;
        function highlightFeature(e) {
            highlightLayer = e.target;

            if (e.target.feature.geometry.type === 'LineString' || e.target.feature.geometry.type === 'MultiLineString') {
              highlightLayer.setStyle({
                color: 'rgba(104, 33, 47, 1.00)',
              });
            } else {
              highlightLayer.setStyle({
                fillColor: 'rgba(104, 33, 47, 1.00)',
                fillOpacity: 1
              });
            }
            highlightLayer.openPopup();
        }
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[16.362371416715163,-110.36035640304011],[28.500714450687532,-92.69935492707084]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/tomchadwin/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var title = new L.Control({'position':'topright'});
        title.onAdd = function (map) {
            this._div = L.DomUtil.create('div', 'info');
            this.update();
            return this._div;
        };
        title.update = function () {
            this._div.innerHTML = '<h2>Análisis territorial de la oferta académica en áreas estratégicas de semiconductores</h2>';
        };
        title.addTo(map);
        var abstract = new L.Control({'position':'bottomleft'});
        abstract.onAdd = function (map) {
            this._div = L.DomUtil.create('div',
            'leaflet-control abstract');
            this._div.id = 'abstract'
                this._div.setAttribute("onmouseenter", "abstract.show()");
                this._div.setAttribute("onmouseleave", "abstract.hide()");
                this.hide();
                return this._div;
            };
            abstract.hide = function () {
                this._div.classList.remove("abstractUncollapsed");
                this._div.classList.add("abstract");
                this._div.innerHTML = 'i'
            }
            abstract.show = function () {
                this._div.classList.remove("abstract");
                this._div.classList.add("abstractUncollapsed");
                this._div.innerHTML = 'Mapa de la oferta académica en semiconductores en México, que muestra la localización de instituciones educativas, programas asociados y su nivel de especialización. Permite identificar la distribución territorial de capacidades formativas, así como patrones de concentración y brechas regionales en la formación de talento especializado.';
        };
        abstract.addTo(map);
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_Mapa_0');
        map.getPane('pane_Mapa_0').style.zIndex = 400;
        var layer_Mapa_0 = L.tileLayer('https://a.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png', {
            pane: 'pane_Mapa_0',
            opacity: 1.0,
            attribution: '<a href="https://cartodb.com/basemaps/">Map tiles by CartoDB, under CC BY 3.0. Data by OpenStreetMap, under ODbL.</a>',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 20
        });
        layer_Mapa_0;
        map.addLayer(layer_Mapa_0);
        function pop_OfertaacdemicaenSemiconductores_1(feature, layer) {
            layer.on({
                mouseout: function(e) {
                    for (var i in e.target._eventParents) {
                        if (typeof e.target._eventParents[i].resetStyle === 'function') {
                            e.target._eventParents[i].resetStyle(e.target);
                        }
                    }
                    if (typeof layer.closePopup == 'function') {
                        layer.closePopup();
                    } else {
                        layer.eachLayer(function(feature){
                            feature.closePopup()
                        });
                    }
                },
                mouseover: highlightFeature,
            });
            var popupContent = '<table>\
                    <tr>\
                        <th scope="row">Nombre de la oferta educativa</th>\
                        <td class="visible-with-data" id="Nombre de la oferta educativa">' + (feature.properties['Nombre de la oferta educativa'] !== null ? autolinker.link(String(feature.properties['Nombre de la oferta educativa']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Nivel educativo</th>\
                        <td class="visible-with-data" id="Nivel educativo">' + (feature.properties['Nivel educativo'] !== null ? autolinker.link(String(feature.properties['Nivel educativo']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Subnivel</th>\
                        <td class="visible-with-data" id="Subnivel">' + (feature.properties['Subnivel'] !== null ? autolinker.link(String(feature.properties['Subnivel']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Institucion</th>\
                        <td class="visible-with-data" id="Institucion">' + (feature.properties['Institucion'] !== null ? autolinker.link(String(feature.properties['Institucion']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Tipo de institución</th>\
                        <td class="visible-with-data" id="Tipo de institución">' + (feature.properties['Tipo de institución'] !== null ? autolinker.link(String(feature.properties['Tipo de institución']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Estado</th>\
                        <td class="visible-with-data" id="Estado">' + (feature.properties['Estado'] !== null ? autolinker.link(String(feature.properties['Estado']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Municipio - Ciudad</th>\
                        <td class="visible-with-data" id="Municipio - Ciudad">' + (feature.properties['Municipio - Ciudad'] !== null ? autolinker.link(String(feature.properties['Municipio - Ciudad']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Tipo de especialización</th>\
                        <td class="visible-with-data" id="Tipo de especialización">' + (feature.properties['Tipo de especialización'] !== null ? autolinker.link(String(feature.properties['Tipo de especialización']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Área de la Cadena de Valor</th>\
                        <td class="visible-with-data" id="Área de la Cadena de Valor">' + (feature.properties['Área de la Cadena de Valor'] !== null ? autolinker.link(String(feature.properties['Área de la Cadena de Valor']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Relación con Semiconductores</th>\
                        <td class="visible-with-data" id="Relación con Semiconductores">' + (feature.properties['Relación con Semiconductores'] !== null ? autolinker.link(String(feature.properties['Relación con Semiconductores']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Enlace al plan u oferta</th>\
                        <td class="visible-with-data" id="Enlace al plan u oferta">' + (feature.properties['Enlace al plan u oferta'] !== null ? autolinker.link(String(feature.properties['Enlace al plan u oferta']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <th scope="row">Observaciones</th>\
                        <td class="visible-with-data" id="Observaciones">' + (feature.properties['Observaciones'] !== null ? autolinker.link(String(feature.properties['Observaciones']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_OfertaacdemicaenSemiconductores_1_0() {
            return {
                pane: 'pane_OfertaacdemicaenSemiconductores_1',
        rotationAngle: 0.0,
        rotationOrigin: 'center center',
        icon: L.icon({
            iconUrl: 'markers/OfertaacdemicaenSemiconductores_1.svg',
            iconSize: [22.04, 22.04]
        }),
                interactive: true,
            }
        }
        map.createPane('pane_OfertaacdemicaenSemiconductores_1');
        map.getPane('pane_OfertaacdemicaenSemiconductores_1').style.zIndex = 401;
        map.getPane('pane_OfertaacdemicaenSemiconductores_1').style['mix-blend-mode'] = 'normal';
        var layer_OfertaacdemicaenSemiconductores_1 = new L.geoJson(json_OfertaacdemicaenSemiconductores_1, {
            attribution: '',
            interactive: true,
            dataVar: 'json_OfertaacdemicaenSemiconductores_1',
            layerName: 'layer_OfertaacdemicaenSemiconductores_1',
            pane: 'pane_OfertaacdemicaenSemiconductores_1',
            onEachFeature: pop_OfertaacdemicaenSemiconductores_1,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.marker(latlng, style_OfertaacdemicaenSemiconductores_1_0(feature));
            },
        });
        bounds_group.addLayer(layer_OfertaacdemicaenSemiconductores_1);
        map.addLayer(layer_OfertaacdemicaenSemiconductores_1);
        var overlaysTree = [
            {label: '<img src="legend/OfertaacdemicaenSemiconductores_1.png" /> Oferta acádemica en Semiconductores', layer: layer_OfertaacdemicaenSemiconductores_1},
            {label: "Mapa", layer: layer_Mapa_0},]
        var lay = L.control.layers.tree(null, overlaysTree,{
            //namedToggle: true,
            //selectorBack: false,
            //closedSymbol: '&#8862; &#x1f5c0;',
            //openedSymbol: '&#8863; &#x1f5c1;',
            //collapseAll: 'Collapse all',
            //expandAll: 'Expand all',
            collapsed: true,
        });
        lay.addTo(map);
        setBounds();
        map.addControl(new L.Control.Search({
            layer: layer_OfertaacdemicaenSemiconductores_1,
            initial: false,
            hideMarkerOnCollapse: true,
            propertyName: 'Estado'}));
        if (typeof url === 'undefined') {
            document.getElementsByClassName('search-button')[0].className += ' fa fa-binoculars';
        } else {
            document.getElementsByClassName('search-button')[1].className += ' fa fa-binoculars';
        }
        </script>        
    </body>
</html>
